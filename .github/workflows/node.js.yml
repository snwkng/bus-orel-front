name: bus-orel-front

on:
  push:
    branches: ['master']

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [24.11.0]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
    env:
      BASE_URL: ${{secrets.BASE_URL}}
    steps:
      - uses: actions/checkout@v4
      - name: Check file before build
        run: |
          ls -l public/images/mercedessprinter.webp
          file public/images/mercedessprinter.webp
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Create .env file
        run: |
          touch .env
          echo "BASE_URL=${{secrets.BASE_URL}}" >> .env
      - name: Clean and Build
        run: |
          rm -rf .nuxt .output # Полная очистка перед билдом
          npm ci
          npm run build
      - name: Restart PM2
        run: pm2 restart front --update-env
